<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raim International</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* FONT */
@font-face {
  font-family: 'Azonix';
  src: url('Azonix.otf');
}

/* BASE */
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#0f2e1d,#07140c);
  color:white;
}

/* NAVBAR */
.navbar {
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  align-items:center;
  padding:15px 30px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

.logo {
  height:50px;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:
  linear-gradient(rgba(0,40,20,0.6), rgba(0,10,5,0.9)),
  url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') center/cover;
}

.hero h1 {
  font-family:'Azonix';
  font-size:54px;
  letter-spacing:3px;
  text-transform:uppercase;
  animation:fadeUp 1s ease;
}

.btn {
  margin-top:20px;
  display:inline-block;
  padding:12px 25px;
  background:linear-gradient(45deg,#22c55e,#16a34a);
  color:black;
  border-radius:6px;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.1);
}

/* SERVICES */
.services {
  padding:80px 20px;
  text-align:center;
}

.services-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.service-card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  transition:0.3s;
}

.service-card:hover {
  transform:translateY(-10px);
}

/* PORTFOLIO */
.portfolio {
  padding:80px 20px;
  text-align:center;
}

.filters button {
  margin:5px;
  padding:8px 15px;
  background:#1f3d2b;
  color:white;
  border:none;
  cursor:pointer;
}

.filters button:hover {
  background:#22c55e;
  color:black;
}

.portfolio-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.portfolio-card {
  border-radius:15px;
  overflow:hidden;
  transition:0.4s;
}

.portfolio-card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.portfolio-card:hover {
  transform:scale(1.05);
}

/* ANIMATION */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:768px){
  .hero {height:auto; padding:80px 20px;}
  .hero h1 {font-size:28px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo-icon.png" class="logo">
</div>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Leading Contracting & MEP Solutions</h1>
    <a href="#portfolio" class="btn">View Projects</a>
  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <h2>Services</h2>
  <div class="services-grid">
    <div class="service-card">Civil Construction</div>
    <div class="service-card">MEP Solutions</div>
    <div class="service-card">Maintenance</div>
  </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="portfolio">
  <h2>Projects</h2>

  <div class="filters">
    <button onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('civil')">Civil</button>
    <button onclick="filterSelection('mep')">MEP</button>
  </div>

  <div class="portfolio-grid">

    <div class="portfolio-card civil">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
    </div>

    <div class="portfolio-card mep">
      <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab">
    </div>

  </div>
</section>

<script>
function filterSelection(category) {
  let cards = document.getElementsByClassName("portfolio-card");

  for (let i = 0; i < cards.length; i++) {
    if (category === "all") {
      cards[i].style.display = "block";
    } else {
      if (cards[i].classList.contains(category)) {
        cards[i].style.display = "block";
      } else {
        cards[i].style.display = "none";
      }
    }
  }
}
</script>

</body>
</html>
