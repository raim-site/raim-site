<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raim International</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* FONT */
@font-face {
  font-family: 'Azonix';
  src: url('Azonix.otf');
}

/* BASE */
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#0f2e1d,#07140c);
  color:white;
}

/* NAVBAR */
.navbar {
  position:fixed;
  width:100%;
  top:0;
  padding:20px 30px;
  background:rgba(0,0,0,0.6);
}

.logo {
  height:80px; /* 🔥 BIGGER LOGO */
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  background:
  radial-gradient(circle, rgba(34,197,94,0.2), transparent),
  linear-gradient(rgba(0,40,20,0.7), rgba(0,10,5,0.9)),
  url('hero.jpg') center/cover;
}

.hero h1 {
  font-family:'Azonix';
  font-size:52px;
  color:#22c55e; /* 🔥 GREEN PREMIUM TEXT */
}

/* SERVICES */
.services {
  padding:80px 20px;
  text-align:center;
}

.services h2 {
  color:#22c55e;
}

.services-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.service-card {
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:12px;
  border:1px solid rgba(34,197,94,0.3);
  font-weight:600;
}

/* PORTFOLIO */
.portfolio {
  padding:80px 20px;
  text-align:center;
}

.portfolio h2 {
  color:#22c55e;
}

.portfolio-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.portfolio-card {
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(34,197,94,0.3);
  background:rgba(255,255,255,0.03);
  transition:0.3s;
}

.portfolio-card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.portfolio-card h3 {
  padding:15px;
  font-size:18px;
  color:#22c55e;
}

.portfolio-card:hover {
  transform:scale(1.05);
}

@media(max-width:768px){
  .hero {height:auto; padding:80px 20px;}
  .hero h1 {font-size:28px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo.png" class="logo">
</div>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Leading Contracting & MEP Solutions</h1>
  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <h2>Services</h2>
  <div class="services-grid">
    <div class="service-card">Civil Construction</div>
    <div class="service-card">MEP Solutions</div>
    <div class="service-card">Maintenance</div>
  </div>
</section>

<!-- PORTFOLIO -->
<section class="portfolio">
  <h2>Projects</h2>

  <div class="portfolio-grid">

    <div class="portfolio-card">
      <img src="project1.jpg">
      <h3>NEOM City Hospital - 2023</h3>
    </div>

    <div class="portfolio-card">
      <img src="project2.jpg">
      <h3>Sindalah Island - 2022</h3>
    </div>

    <div class="portfolio-card">
      <img src="project3.jpg">
      <h3>Riyadh Metro - 2018</h3>
    </div>

    <div class="portfolio-card">
      <img src="project4.jpg">
      <h3>KAFD - 2020</h3>
    </div>

    <div class="portfolio-card">
      <img src="project5.jpg">
      <h3>Aramco Stadium - 2025</h3>
    </div>

    <div class="portfolio-card">
      <img src="project6.jpg">
      <h3>Trojena - 2024</h3>
    </div>

  </div>
</section>

</body>
</html>
