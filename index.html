<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raim International</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* FONT */
@font-face {
  font-family: 'Azonix';
  src: url('Azonix.otf');
}

/* BASE */
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0b0f19;
  color:white;
}

/* NAVBAR */
.navbar {
  position:fixed;
  width:100%;
  top:0;
  padding:15px;
}

.logo { height:60px; }

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
  url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') center/cover;
}

.hero h1 {
  font-family:'Azonix';
}

/* SERVICES */
.services {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

/* PORTFOLIO */
.portfolio {
  padding:70px 20px;
  text-align:center;
}

.filters button {
  margin:5px;
  padding:8px;
}

.portfolio-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.portfolio-card {
  background:#111827;
  border-radius:10px;
}

.portfolio-card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

/* MOBILE */
@media(max-width:768px){
  .hero {height:auto;}
}

</style>
</head>

<body>

<div class="navbar">
  <img src="logo.png" class="logo">
</div>

<section class="hero">
  <div>
    <h1>Leading Contracting & MEP Solutions</h1>
  </div>
</section>

<section>
  <h2>Services</h2>
  <div class="services">
    <div>Civil</div>
    <div>MEP</div>
    <div>Maintenance</div>
  </div>
</section>

<!-- PORTFOLIO -->
<section class="portfolio">
  <h2>Projects</h2>

  <div class="filters">
    <button onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('civil')">Civil</button>
    <button onclick="filterSelection('mep')">MEP</button>
  </div>

  <div class="portfolio-grid">

    <div class="portfolio-card civil">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
      <h3>NEOM</h3>
    </div>

    <div class="portfolio-card mep">
      <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab">
      <h3>Metro</h3>
    </div>

  </div>
</section>

<script>
function filterSelection(category) {
  let cards = document.getElementsByClassName("portfolio-card");

  for (let i = 0; i < cards.length; i++) {
    if (category === "all") {
      cards[i].style.display = "block";
    } else {
      if (cards[i].classList.contains(category)) {
        cards[i].style.display = "block";
      } else {
        cards[i].style.display = "none";
      }
    }
  }
}
</script>

</body>
</html>
